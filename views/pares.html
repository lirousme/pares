<section class="flex min-h-[calc(100dvh_-_2rem_-_env(safe-area-inset-bottom))] w-full flex-col rounded-2xl border border-slate-800 bg-slate-900/70 p-6 shadow-2xl backdrop-blur">
  <header class="flex items-center justify-between gap-3 border-b border-slate-800 pb-4">
    <button
      id="btnVoltarPares"
      type="button"
      class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm font-medium text-slate-200 transition hover:border-slate-500 hover:text-white"
    >
      Voltar
    </button>

    <h1 class="text-xl font-bold text-white">Revisão de pares</h1>

    <button
      id="btnCriarPares"
      type="button"
      class="rounded-lg border border-brand-500/60 bg-brand-600 px-3 py-2 text-sm font-semibold text-white transition hover:bg-brand-500"
    >
      Criar pares
    </button>
  </header>

  <div id="feedbackPares" class="mt-4 hidden rounded-lg border p-3 text-sm"></div>

  <div id="conteudoPares" class="flex flex-1 flex-col items-center justify-center">
    <div id="cardFlash" class="relative w-full max-w-xl rounded-2xl border border-slate-700 bg-slate-950 p-8 text-center shadow-lg">
      <div class="absolute right-3 top-3 flex items-center gap-2">
        <button
          id="btnConfigCard"
          type="button"
          class="rounded-md border border-slate-600 bg-slate-900 px-2 py-1 text-xs font-semibold text-slate-200 transition hover:border-slate-400 hover:text-white"
        >
          Config
        </button>
        <button
          id="btnGerarAudioCard"
          type="button"
          class="rounded-md border border-slate-600 bg-slate-900 px-2 py-1 text-xs font-semibold text-slate-200 transition hover:border-slate-400 hover:text-white"
        >
          Gerar áudio
        </button>
        <button
          id="btnToggleOkPar"
          type="button"
          class="rounded-md border border-slate-600 bg-slate-900 px-2 py-1 text-xs font-semibold text-slate-200 transition hover:border-slate-400 hover:text-white"
        >
          ok: --
        </button>
      </div>
      <p id="textoCard" class="text-xl font-semibold text-white">Carregando...</p>
      <p id="metaCard" class="mt-2 text-xs text-slate-400"></p>
    </div>
  </div>

  <footer class="mt-6 border-t border-slate-800 pt-4">
    <div class="flex items-center justify-center gap-3">
      <button
        id="btnAnterior"
        type="button"
        class="rounded-lg border border-slate-700 bg-slate-950 px-4 py-2 text-sm font-medium text-slate-200 transition hover:border-slate-500 hover:text-white"
      >
        Anterior
      </button>
      <button
        id="btnProximo"
        type="button"
        class="rounded-lg border border-brand-500/60 bg-brand-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-brand-500"
      >
        Próximo
      </button>
    </div>
  </footer>

  <div
    id="modalEditarCard"
    class="fixed inset-0 z-30 hidden items-center justify-center bg-slate-950/80 p-4"
    role="dialog"
    aria-modal="true"
    aria-labelledby="tituloModalEditarCard"
  >
    <div class="w-full max-w-xl rounded-xl border border-slate-700 bg-slate-900 p-4 shadow-2xl">
      <div class="mb-3 flex items-center justify-between gap-3 border-b border-slate-700 pb-3">
        <h2 id="tituloModalEditarCard" class="text-base font-semibold text-white">Editar card atual</h2>
        <button
          id="btnFecharModalEditarCard"
          type="button"
          class="rounded-md border border-slate-600 bg-slate-950 px-2 py-1 text-xs font-semibold text-slate-200 transition hover:border-slate-400 hover:text-white"
        >
          Fechar
        </button>
      </div>
      <form id="formEditarCard" class="space-y-3">
        <label for="textoEditarCard" class="block text-sm text-slate-200">Texto do card</label>
        <textarea
          id="textoEditarCard"
          name="texto"
          rows="6"
          maxlength="1500"
          class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-100 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-500/20"
          required
        ></textarea>
        <div class="flex justify-end">
          <button
            id="btnTraduzirEditarCard"
            type="button"
            class="rounded-lg border border-slate-700 px-3 py-2 text-xs font-semibold text-slate-200 transition hover:border-slate-500 hover:text-white disabled:cursor-not-allowed disabled:opacity-60"
          >
            Traduzir
          </button>
        </div>
        <div class="flex items-center justify-end gap-2 pt-1">
          <button
            id="btnCancelarEdicaoCard"
            type="button"
            class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm font-medium text-slate-200 transition hover:border-slate-500 hover:text-white"
          >
            Cancelar
          </button>
          <button
            id="btnSalvarEdicaoCard"
            type="submit"
            class="rounded-lg border border-brand-500/60 bg-brand-600 px-3 py-2 text-sm font-semibold text-white transition hover:bg-brand-500"
          >
            Salvar
          </button>
        </div>
      </form>
    </div>
  </div>
</section>

<script>
  (function initParesView() {
    const btnVoltarPares = document.getElementById('btnVoltarPares');
    const btnCriarPares = document.getElementById('btnCriarPares');
    const btnAnterior = document.getElementById('btnAnterior');
    const btnProximo = document.getElementById('btnProximo');
    const btnToggleOkPar = document.getElementById('btnToggleOkPar');
    const btnConfigCard = document.getElementById('btnConfigCard');
    const btnGerarAudioCard = document.getElementById('btnGerarAudioCard');
    const textoCard = document.getElementById('textoCard');
    const metaCard = document.getElementById('metaCard');
    const feedbackPares = document.getElementById('feedbackPares');
    const modalEditarCard = document.getElementById('modalEditarCard');
    const btnFecharModalEditarCard = document.getElementById('btnFecharModalEditarCard');
    const btnCancelarEdicaoCard = document.getElementById('btnCancelarEdicaoCard');
    const formEditarCard = document.getElementById('formEditarCard');
    const textoEditarCard = document.getElementById('textoEditarCard');
    const btnTraduzirEditarCard = document.getElementById('btnTraduzirEditarCard');
    const btnSalvarEdicaoCard = document.getElementById('btnSalvarEdicaoCard');

    const params = new URLSearchParams(window.location.search);
    const idDiretorio = Number.parseInt(params.get('id_diretorio') || '', 10);
    const tipoDiretorio = Number.parseInt(params.get('tipo_diretorio') || '2', 10);

    let pares = [];
    let indiceParAtual = 0;
    let indiceCardAtual = 0;
    let proximaRevisaoMaisProxima = null;
    let audioCardAtual = null;

    function showFeedback(message, type = 'error') {
      feedbackPares.textContent = message;
      feedbackPares.classList.remove(
        'hidden',
        'border-rose-500/40',
        'bg-rose-500/10',
        'text-rose-200',
        'border-emerald-500/40',
        'bg-emerald-500/10',
        'text-emerald-200',
      );

      if (type === 'success') {
        feedbackPares.classList.add('border-emerald-500/40', 'bg-emerald-500/10', 'text-emerald-200');
      } else {
        feedbackPares.classList.add('border-rose-500/40', 'bg-rose-500/10', 'text-rose-200');
      }
    }

    function hideFeedback() {
      feedbackPares.classList.add('hidden');
    }

    function irParaBiblioteca() {
      const nextParams = new URLSearchParams(window.location.search);
      nextParams.set('view', 'biblioteca');
      if (tipoDiretorio === 1 && Number.isInteger(idDiretorio) && idDiretorio > 0) {
        nextParams.set('id_pai', String(idDiretorio));
      } else {
        nextParams.delete('id_pai');
      }
      nextParams.delete('id_diretorio');
      nextParams.delete('tipo_diretorio');
      const newUrl = `${window.location.pathname}?${nextParams.toString()}`;
      window.history.pushState({}, '', newUrl);
      window.dispatchEvent(new PopStateEvent('popstate'));
    }

    function currentPair() {
      return pares[indiceParAtual] || null;
    }

    function currentCardId() {
      const par = currentPair();
      if (!par) {
        return null;
      }

      return indiceCardAtual === 0
        ? Number.parseInt(par.id_card_um, 10)
        : Number.parseInt(par.id_card_dois, 10);
    }

    function currentCardOk() {
      const par = currentPair();
      if (!par) {
        return null;
      }

      return indiceCardAtual === 0
        ? Number.parseInt(par.card_um_ok, 10)
        : Number.parseInt(par.card_dois_ok, 10);
    }

    function currentCardTexto() {
      const par = currentPair();
      if (!par) {
        return '';
      }

      return indiceCardAtual === 0
        ? (par.card_um_texto || '')
        : (par.card_dois_texto || '');
    }

    function setCurrentCardTexto(texto) {
      const par = currentPair();
      if (!par) {
        return;
      }

      if (indiceCardAtual === 0) {
        par.card_um_texto = texto;
      } else {
        par.card_dois_texto = texto;
      }
    }

    function currentCardAudio() {
      const par = currentPair();
      if (!par) {
        return '';
      }

      return indiceCardAtual === 0
        ? (par.card_um_audio || '')
        : (par.card_dois_audio || '');
    }

    function setCurrentCardAudio(audioBase64) {
      const par = currentPair();
      if (!par) {
        return;
      }

      if (indiceCardAtual === 0) {
        par.card_um_audio = audioBase64;
      } else {
        par.card_dois_audio = audioBase64;
      }
    }

    async function playCurrentCardAudio() {
      const audioBase64 = currentCardAudio();
      if (!audioBase64) {
        return;
      }

      try {
        if (audioCardAtual) {
          audioCardAtual.pause();
          audioCardAtual.currentTime = 0;
        }

        audioCardAtual = new Audio(`data:audio/mp3;base64,${audioBase64}`);
        await audioCardAtual.play();
      } catch (error) {
        // Ignora erros de autoplay (restrição de navegador, falta de gesto do usuário, etc.).
      }
    }

    function abrirModalEdicao() {
      if (!currentPair()) {
        return;
      }

      textoEditarCard.value = currentCardTexto();
      modalEditarCard.classList.remove('hidden');
      modalEditarCard.classList.add('flex');
      textoEditarCard.focus();
      textoEditarCard.setSelectionRange(textoEditarCard.value.length, textoEditarCard.value.length);
    }

    function fecharModalEdicao() {
      modalEditarCard.classList.add('hidden');
      modalEditarCard.classList.remove('flex');
    }

    function updateButtons() {
      const hasPair = currentPair() !== null;
      btnAnterior.disabled = !hasPair || (indiceParAtual === 0 && indiceCardAtual === 0);
      btnAnterior.classList.toggle('opacity-50', btnAnterior.disabled);
      btnAnterior.classList.toggle('cursor-not-allowed', btnAnterior.disabled);
      btnConfigCard.disabled = !hasPair;
      btnConfigCard.classList.toggle('opacity-50', btnConfigCard.disabled);
      btnConfigCard.classList.toggle('cursor-not-allowed', btnConfigCard.disabled);
      btnGerarAudioCard.disabled = !hasPair;
      btnGerarAudioCard.classList.toggle('opacity-50', btnGerarAudioCard.disabled);
      btnGerarAudioCard.classList.toggle('cursor-not-allowed', btnGerarAudioCard.disabled);

      if (!hasPair) {
        btnProximo.disabled = true;
        btnProximo.textContent = 'Próximo';
        btnProximo.classList.add('opacity-50', 'cursor-not-allowed');
        return;
      }

      btnProximo.disabled = false;
      btnProximo.classList.remove('opacity-50', 'cursor-not-allowed');
      btnProximo.textContent = indiceCardAtual === 1 ? 'Concluir' : 'Próximo';
    }

    function renderCard() {
      const par = currentPair();

      if (!par) {
        textoCard.textContent = 'Nenhum par vencido para revisão agora.';
        if (proximaRevisaoMaisProxima && proximaRevisaoMaisProxima.proxima_revisao) {
          metaCard.textContent = `Próxima revisão prevista para ${proximaRevisaoMaisProxima.proxima_revisao} (UTC-03:00).`;
        } else {
          metaCard.textContent = 'Quando houver revisões vencidas, elas aparecerão aqui.';
        }
        btnToggleOkPar.disabled = true;
        btnToggleOkPar.classList.add('hidden');
        btnConfigCard.classList.add('hidden');
        btnGerarAudioCard.classList.add('hidden');
        updateButtons();
        return;
      }

      const textos = [
        par.card_um_texto || 'Card 1 sem texto.',
        par.card_dois_texto || 'Card 2 sem texto.',
      ];

      textoCard.textContent = textos[indiceCardAtual];
      metaCard.textContent = `Par ${indiceParAtual + 1} de ${pares.length} • Card ${indiceCardAtual + 1} de 2`;
      btnToggleOkPar.classList.remove('hidden');
      btnConfigCard.classList.remove('hidden');
      btnGerarAudioCard.classList.remove('hidden');
      btnToggleOkPar.disabled = false;
      btnToggleOkPar.textContent = `ok: ${currentCardOk()}`;
      updateButtons();
      playCurrentCardAudio();
    }

    async function concluirParAtual() {
      const par = currentPair();
      if (!par) {
        return;
      }

      const response = await fetch('api/pares.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          action: 'concluir_revisao',
          id_par: par.id,
        }),
      });

      const result = await response.json();

      if (response.status === 401) {
        window.location.href = 'index.html?view=login';
        return;
      }

      if (!response.ok || !result.success) {
        throw new Error(result.message || 'Não foi possível concluir a revisão.');
      }

      showFeedback(
        `Par concluído. Próxima revisão em ${result.proxima_revisao} (UTC-03:00).`,
        'success',
      );

      await loadPairs();
    }

    btnVoltarPares.addEventListener('click', irParaBiblioteca);

    btnCriarPares.addEventListener('click', () => {
      const nextParams = new URLSearchParams(window.location.search);
      nextParams.set('view', 'criar_pares');
      nextParams.set('id_diretorio', String(idDiretorio));
      nextParams.delete('id_pai');
      const newUrl = `${window.location.pathname}?${nextParams.toString()}`;
      window.history.pushState({}, '', newUrl);
      window.dispatchEvent(new PopStateEvent('popstate'));
    });

    btnAnterior.addEventListener('click', () => {
      hideFeedback();

      if (indiceCardAtual === 1) {
        indiceCardAtual = 0;
        renderCard();
        return;
      }

      if (indiceParAtual > 0) {
        indiceParAtual -= 1;
        indiceCardAtual = 1;
        renderCard();
      }
    });

    btnToggleOkPar.addEventListener('click', async () => {
      hideFeedback();
      const par = currentPair();
      const idCard = currentCardId();
      if (!par || !Number.isInteger(idCard) || idCard <= 0) {
        return;
      }

      btnToggleOkPar.disabled = true;

      try {
        const response = await fetch('api/pares.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            action: 'alternar_ok_card',
            id_card: idCard,
          }),
        });
        const result = await response.json();

        if (response.status === 401) {
          window.location.href = 'index.html?view=login';
          return;
        }

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Não foi possível alternar o valor de ok.');
        }

        const okNovo = Number.parseInt(result.ok_novo, 10);
        if (indiceCardAtual === 0) {
          par.card_um_ok = okNovo;
        } else {
          par.card_dois_ok = okNovo;
        }
        btnToggleOkPar.textContent = `ok: ${okNovo}`;
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao alternar o valor de ok.');
      } finally {
        btnToggleOkPar.disabled = false;
      }
    });

    btnConfigCard.addEventListener('click', () => {
      hideFeedback();
      abrirModalEdicao();
    });

    btnGerarAudioCard.addEventListener('click', async () => {
      hideFeedback();
      const idCard = currentCardId();
      if (!Number.isInteger(idCard) || idCard <= 0) {
        return;
      }

      btnGerarAudioCard.disabled = true;
      btnGerarAudioCard.classList.add('opacity-50', 'cursor-not-allowed');

      try {
        const response = await fetch('api/pares.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            action: 'gerar_audio_card',
            id_card: idCard,
          }),
        });
        const result = await response.json();

        if (response.status === 401) {
          window.location.href = 'index.html?view=login';
          return;
        }

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Não foi possível gerar o áudio do card.');
        }

        const audio = (result.card?.audio || '').trim();
        if (!audio) {
          throw new Error('A API não retornou áudio para este card.');
        }

        setCurrentCardAudio(audio);
        await playCurrentCardAudio();
        showFeedback('Áudio gerado com sucesso.', 'success');
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao gerar áudio do card.');
      } finally {
        btnGerarAudioCard.disabled = false;
        btnGerarAudioCard.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    });

    btnFecharModalEditarCard.addEventListener('click', fecharModalEdicao);
    btnCancelarEdicaoCard.addEventListener('click', fecharModalEdicao);
    modalEditarCard.addEventListener('click', (event) => {
      if (event.target === modalEditarCard) {
        fecharModalEdicao();
      }
    });

    formEditarCard.addEventListener('submit', async (event) => {
      event.preventDefault();
      hideFeedback();

      const idCard = currentCardId();
      const texto = textoEditarCard.value.trim();
      if (!Number.isInteger(idCard) || idCard <= 0) {
        return;
      }

      if (!texto) {
        showFeedback('Digite o texto do card para salvar.');
        return;
      }

      btnSalvarEdicaoCard.disabled = true;
      btnSalvarEdicaoCard.classList.add('opacity-50', 'cursor-not-allowed');

      try {
        const response = await fetch('api/pares.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            action: 'editar_card',
            id_card: idCard,
            texto,
          }),
        });
        const result = await response.json();

        if (response.status === 401) {
          window.location.href = 'index.html?view=login';
          return;
        }

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Não foi possível editar o card.');
        }

        setCurrentCardTexto(result.card?.texto || texto);
        renderCard();
        fecharModalEdicao();
        showFeedback('Card atualizado com sucesso.', 'success');
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao editar card.');
      } finally {
        btnSalvarEdicaoCard.disabled = false;
        btnSalvarEdicaoCard.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    });

    btnTraduzirEditarCard.addEventListener('click', async () => {
      const texto = textoEditarCard.value.trim();
      if (!texto) {
        showFeedback('Digite um texto para traduzir.');
        return;
      }

      btnTraduzirEditarCard.disabled = true;
      btnTraduzirEditarCard.textContent = 'Traduzindo...';

      try {
        const response = await fetch('api/pares.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            action: 'traduzir_texto',
            texto,
          }),
        });
        const result = await response.json();

        if (response.status === 401) {
          window.location.href = 'index.html?view=login';
          return;
        }

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Não foi possível traduzir o texto.');
        }

        textoEditarCard.value = result.texto_traduzido || texto;
        hideFeedback();
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao traduzir texto.');
      } finally {
        btnTraduzirEditarCard.disabled = false;
        btnTraduzirEditarCard.textContent = 'Traduzir';
      }
    });

    btnProximo.addEventListener('click', async () => {
      hideFeedback();

      if (indiceCardAtual === 0) {
        indiceCardAtual = 1;
        renderCard();
        return;
      }

      try {
        await concluirParAtual();
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao concluir revisão.', 'error');
      }
    });

    async function loadPairs() {
      if (Number.isNaN(idDiretorio) || idDiretorio <= 0) {
        showFeedback('ID do diretório inválido.', 'error');
        textoCard.textContent = 'Não foi possível carregar os pares.';
        metaCard.textContent = '';
        updateButtons();
        return;
      }

      hideFeedback();

      try {
        const response = await fetch(`api/pares.php?id_diretorio=${encodeURIComponent(idDiretorio)}`, {
          cache: 'no-store',
        });
        const result = await response.json();

        if (response.status === 401) {
          window.location.href = 'index.html?view=login';
          return;
        }

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Não foi possível carregar os pares.');
        }

        pares = Array.isArray(result.pares) ? result.pares : [];
        proximaRevisaoMaisProxima = result.proxima_revisao_mais_proxima || null;
        indiceParAtual = 0;
        indiceCardAtual = 0;

        if (pares.length === 0 && proximaRevisaoMaisProxima && proximaRevisaoMaisProxima.proxima_revisao) {
          showFeedback(
            `Nenhum par vencido no momento. Próxima revisão em ${proximaRevisaoMaisProxima.proxima_revisao} (UTC-03:00).`,
            'success',
          );
        }

        renderCard();
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao carregar pares.', 'error');
        textoCard.textContent = 'Erro ao carregar pares.';
        metaCard.textContent = '';
        updateButtons();
      }
    }

    loadPairs();
  })();
</script>
