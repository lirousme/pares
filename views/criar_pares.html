<section class="flex min-h-[calc(100dvh_-_2rem_-_env(safe-area-inset-bottom))] w-full flex-col rounded-2xl border border-slate-800 bg-slate-900/70 p-6 shadow-2xl backdrop-blur">
  <header class="mb-6 flex items-center justify-between gap-3">
    <button
      id="btnVoltarCriarPares"
      type="button"
      class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm font-medium text-slate-200 transition hover:border-slate-500 hover:text-white"
    >
      Voltar
    </button>
    <div class="flex items-center gap-2">
      <button
        id="contadorCriacaoCards"
        type="button"
        disabled
        aria-label="Contador de criação de cards"
        class="inline-flex h-9 min-w-9 items-center justify-center rounded-lg border border-brand-500/60 bg-brand-500/20 px-3 text-sm font-bold leading-none text-brand-200"
      >
        0
      </button>
      <h1 id="tituloExpansionsCriarPares" class="text-xl font-bold text-white">--</h1>
    </div>
    <div class="flex items-center gap-2">
      <button
        id="btnEditarCard"
        type="button"
        class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm font-medium text-slate-200 transition hover:border-slate-500 hover:text-white disabled:cursor-not-allowed disabled:opacity-60"
      >
        Editar
      </button>
      <button
        id="btnGerarAudioCardEnGb"
        type="button"
        class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm font-medium text-slate-200 transition hover:border-slate-500 hover:text-white"
      >
        Gerar áudio
      </button>
      <button
        id="btnNovoCard"
        type="button"
        aria-label="Criar novo card"
        class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-brand-500/60 bg-brand-500/20 text-xl font-bold leading-none text-brand-200 transition hover:border-brand-500 hover:bg-brand-500/30 hover:text-white"
      >
        +
      </button>
    </div>
  </header>

  <div id="feedbackCriarPares" class="mb-4 hidden rounded-lg border p-3 text-sm"></div>

  <div class="flex flex-1 items-center justify-center">
    <div class="relative w-full max-w-xl rounded-2xl border border-slate-700 bg-slate-950 p-8 text-center shadow-lg">
      <p id="textoCardPtBrCriarPares" class="text-lg font-semibold text-[#8A05BE]"></p>
      <p id="textoCardCriarPares" class="mt-2 text-xl font-semibold text-white">Carregando...</p>
    </div>
  </div>

  <form id="formRespostaPar" class="mt-6">
    <div class="rounded-2xl border border-slate-700 bg-slate-950 px-3 py-2 shadow-lg">
      <div class="mb-2 flex flex-wrap items-center justify-end gap-3">
        <div class="mr-auto flex items-center gap-2 text-sm">
          <button
            id="switchRespostaPtBrPrimario"
            type="button"
            role="switch"
            aria-checked="false"
            class="inline-flex h-7 w-14 items-center rounded-full border border-slate-600 bg-slate-800 px-1 transition"
          >
            <span id="switchRespostaPtBrPrimarioKnob" class="h-5 w-5 rounded-full bg-white transition"></span>
          </button>
          <label for="switchRespostaPtBrPrimario" class="text-slate-200">Salvar em pt-BR</label>
        </div>
        <button
          id="btnRepetirAudioCardEnGb"
          type="button"
          class="inline-flex h-11 items-center justify-center gap-2 rounded-xl border border-slate-700 px-4 text-sm font-semibold text-slate-200 transition hover:border-slate-500 hover:text-white disabled:cursor-not-allowed disabled:opacity-60"
        >
          <span id="iconeRepetirAudioCardEnGb" aria-hidden="true">🔁</span>
          <span id="textoRepetirAudioCardEnGb">Repetir áudio</span>
        </button>
        <button
          id="btnReproduzirAudioCardEnGb"
          type="button"
          class="inline-flex h-11 items-center justify-center gap-2 rounded-xl border border-slate-700 px-4 text-sm font-semibold text-slate-200 transition hover:border-slate-500 hover:text-white disabled:cursor-not-allowed disabled:opacity-60"
        >
          <span id="iconeReproduzirAudioCardEnGb" aria-hidden="true">▶</span>
          <span id="textoReproduzirAudioCardEnGb">Play áudio</span>
        </button>
        <button
          id="btnTraduzirRespostaPar"
          type="button"
          class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-700 px-4 text-sm font-semibold text-slate-200 transition hover:border-slate-500 hover:text-white disabled:cursor-not-allowed disabled:opacity-60"
        >
          Traduzir para en-GB
        </button>
        <button
          id="btnEnviarRespostaPar"
          type="submit"
          class="inline-flex h-11 min-w-20 items-center justify-center rounded-xl bg-brand-600 px-4 text-sm font-semibold text-white transition hover:bg-brand-500 disabled:cursor-not-allowed disabled:opacity-60"
        >
          Enviar
        </button>
      </div>
      <textarea
        id="textoRespostaParEnGb"
        name="texto_engb"
        maxlength="1500"
        required
        rows="1"
        class="mb-2 max-h-48 min-h-11 w-full resize-none overflow-y-auto rounded-xl border border-slate-700 bg-transparent px-2 py-3 text-sm text-slate-100 outline-none placeholder:text-slate-500"
        placeholder="Digite o texto em inglês (en-GB)..."
      ></textarea>
    </div>
  </form>

  <div id="modalNovoCard" class="fixed inset-0 z-20 hidden items-center justify-center bg-slate-950/70 p-4">
    <div class="w-full max-w-lg rounded-2xl border border-slate-700 bg-slate-900 p-6 shadow-2xl">
      <div class="mb-4 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-white">Novo card</h2>
        <button
          id="btnFecharModalNovoCard"
          type="button"
          class="rounded-md border border-slate-700 px-2 py-1 text-xs font-medium text-slate-300 transition hover:border-slate-500 hover:text-white"
        >
          Fechar
        </button>
      </div>

      <form id="formNovoCard" class="space-y-4">
        <div>
          <label for="textoNovoCardEnGb" class="mb-1 block text-sm text-slate-200">Texto (en-GB)</label>
          <textarea
            id="textoNovoCardEnGb"
            name="texto_engb"
            required
            rows="4"
            maxlength="1500"
            class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-100 outline-none transition focus:border-brand-500"
            placeholder="Digite o conteúdo em inglês britânico"
          ></textarea>
        </div>

        <div id="containerNovoCardPtBr">
          <label for="textoNovoCardPtBr" class="mb-1 block text-sm text-slate-200">Texto (pt-BR)</label>
          <textarea
            id="textoNovoCardPtBr"
            name="texto_ptbr"
            required
            rows="4"
            maxlength="1500"
            class="w-full rounded-lg border border-emerald-500/60 bg-slate-950 px-3 py-2 text-sm text-slate-100 outline-none transition focus:border-emerald-400"
            placeholder="Digite o conteúdo em português brasileiro"
          ></textarea>
          <div class="mt-2 flex justify-end">
            <button
              id="btnTraduzirNovoCard"
              type="button"
              class="rounded-lg border border-slate-700 px-3 py-2 text-xs font-semibold text-slate-200 transition hover:border-slate-500 hover:text-white disabled:cursor-not-allowed disabled:opacity-60"
            >
              Traduzir para en-GB
            </button>
          </div>
        </div>

        <div class="flex justify-end gap-2 pt-2">
          <button
            id="btnCancelarNovoCard"
            type="button"
            class="rounded-lg border border-slate-700 px-4 py-2 text-sm font-medium text-slate-200 transition hover:border-slate-500 hover:text-white"
          >
            Cancelar
          </button>
          <button
            id="btnSalvarNovoCard"
            type="submit"
            class="rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-brand-500"
          >
            Salvar
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="modalEditarCard" class="fixed inset-0 z-20 hidden items-center justify-center bg-slate-950/70 p-4">
    <div class="w-full max-w-lg rounded-2xl border border-slate-700 bg-slate-900 p-6 shadow-2xl">
      <div class="mb-4 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-white">Editar card</h2>
        <button
          id="btnFecharModalEditarCard"
          type="button"
          class="rounded-md border border-slate-700 px-2 py-1 text-xs font-medium text-slate-300 transition hover:border-slate-500 hover:text-white"
        >
          Fechar
        </button>
      </div>

      <form id="formEditarCard" class="space-y-4">
        <div>
          <label for="textoEditarCardEnGb" class="mb-1 block text-sm text-slate-200">Texto (en-GB)</label>
          <textarea
            id="textoEditarCardEnGb"
            name="texto_engb"
            required
            rows="4"
            maxlength="1500"
            class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-100 outline-none transition focus:border-brand-500"
            placeholder="Digite o conteúdo em inglês britânico"
          ></textarea>
        </div>

        <div id="containerEditarCardPtBr">
          <label for="textoEditarCardPtBr" class="mb-1 block text-sm text-slate-200">Texto (pt-BR)</label>
          <textarea
            id="textoEditarCardPtBr"
            name="texto_ptbr"
            required
            rows="4"
            maxlength="1500"
            class="w-full rounded-lg border border-emerald-500/60 bg-slate-950 px-3 py-2 text-sm text-slate-100 outline-none transition focus:border-emerald-400"
            placeholder="Digite o conteúdo em português brasileiro"
          ></textarea>
        </div>

        <div class="flex justify-end gap-2 pt-2">
          <button
            id="btnCancelarEditarCard"
            type="button"
            class="rounded-lg border border-slate-700 px-4 py-2 text-sm font-medium text-slate-200 transition hover:border-slate-500 hover:text-white"
          >
            Cancelar
          </button>
          <button
            id="btnSalvarEditarCard"
            type="submit"
            class="rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-brand-500"
          >
            Salvar
          </button>
        </div>
      </form>
    </div>
  </div>
</section>

<script>
  (function initCriarParesView() {
    const viewLifecycleController = new AbortController();
    const { signal } = viewLifecycleController;
    const btnVoltar = document.getElementById('btnVoltarCriarPares');
    const btnNovoCard = document.getElementById('btnNovoCard');
    const btnEditarCard = document.getElementById('btnEditarCard');
    const modalNovoCard = document.getElementById('modalNovoCard');
    const modalEditarCard = document.getElementById('modalEditarCard');
    const btnFecharModalNovoCard = document.getElementById('btnFecharModalNovoCard');
    const btnFecharModalEditarCard = document.getElementById('btnFecharModalEditarCard');
    const btnCancelarNovoCard = document.getElementById('btnCancelarNovoCard');
    const btnCancelarEditarCard = document.getElementById('btnCancelarEditarCard');
    const formNovoCard = document.getElementById('formNovoCard');
    const formEditarCard = document.getElementById('formEditarCard');
    const textoNovoCardEnGb = document.getElementById('textoNovoCardEnGb');
    const textoNovoCardPtBr = document.getElementById('textoNovoCardPtBr');
    const textoEditarCardEnGb = document.getElementById('textoEditarCardEnGb');
    const textoEditarCardPtBr = document.getElementById('textoEditarCardPtBr');
    const containerNovoCardPtBr = document.getElementById('containerNovoCardPtBr');
    const containerEditarCardPtBr = document.getElementById('containerEditarCardPtBr');
    const btnTraduzirNovoCard = document.getElementById('btnTraduzirNovoCard');
    const btnSalvarNovoCard = document.getElementById('btnSalvarNovoCard');
    const btnSalvarEditarCard = document.getElementById('btnSalvarEditarCard');
    const textoCard = document.getElementById('textoCardCriarPares');
    const textoCardPtBr = document.getElementById('textoCardPtBrCriarPares');
    const tituloExpansions = document.getElementById('tituloExpansionsCriarPares');
    const contadorCriacaoCards = document.getElementById('contadorCriacaoCards');
    const btnGerarAudioCardEnGb = document.getElementById('btnGerarAudioCardEnGb');
    const feedbackCriarPares = document.getElementById('feedbackCriarPares');
    const formRespostaPar = document.getElementById('formRespostaPar');
    const textoRespostaParEnGb = document.getElementById('textoRespostaParEnGb');
    const btnRepetirAudioCardEnGb = document.getElementById('btnRepetirAudioCardEnGb');
    const iconeRepetirAudioCardEnGb = document.getElementById('iconeRepetirAudioCardEnGb');
    const textoRepetirAudioCardEnGb = document.getElementById('textoRepetirAudioCardEnGb');
    const btnReproduzirAudioCardEnGb = document.getElementById('btnReproduzirAudioCardEnGb');
    const iconeReproduzirAudioCardEnGb = document.getElementById('iconeReproduzirAudioCardEnGb');
    const textoReproduzirAudioCardEnGb = document.getElementById('textoReproduzirAudioCardEnGb');
    const btnTraduzirRespostaPar = document.getElementById('btnTraduzirRespostaPar');
    const btnEnviarRespostaPar = document.getElementById('btnEnviarRespostaPar');
    const switchRespostaPtBrPrimario = document.getElementById('switchRespostaPtBrPrimario');
    const switchRespostaPtBrPrimarioKnob = document.getElementById('switchRespostaPtBrPrimarioKnob');
    const params = new URLSearchParams(window.location.search);
    const idDiretorio = Number.parseInt(params.get('id_diretorio') || '', 10);
    let idCardAtual = null;
    let contadorCardsCriados = 0;
    let quantidadeRevisoesCardAtual = 0;
    const AUDIO_CARD_MAX_CHARS = 500;
    let audioCardAtual = null;
    let audioCardEmReproducao = false;
    let audioCardRepeticaoAtiva = false;
    let cacheAudioCardId = null;
    let cacheAudioCardEnGbBase64 = '';
    let cacheAudioCardPtBrBase64 = '';
    let ptbrAtivo = true;
    let respostaPtBrPrimario = false;
    let cardAtualEhPtBrPrimario = false;

    function setAudioPlaybackUiState(isPlaying) {
      audioCardEmReproducao = isPlaying;
      iconeReproduzirAudioCardEnGb.textContent = isPlaying ? '⏸' : '▶';
      textoReproduzirAudioCardEnGb.textContent = isPlaying ? 'Pausar áudio' : 'Play áudio';
    }

    function setAudioLoopUiState(isLooping) {
      audioCardRepeticaoAtiva = isLooping;
      iconeRepetirAudioCardEnGb.textContent = isLooping ? '⏸' : '🔁';
      textoRepetirAudioCardEnGb.textContent = isLooping ? 'Parar repetição' : 'Repetir áudio';
    }

    function limparCacheAudioCard() {
      cacheAudioCardId = null;
      cacheAudioCardEnGbBase64 = '';
      cacheAudioCardPtBrBase64 = '';
    }

    async function carregarPreferenciaPtBr() {
      const response = await fetch('api/usuario.php', { cache: 'no-store' });
      const result = await response.json();
      if (response.status === 401) {
        window.location.href = 'index.html?view=login';
        return;
      }
      if (!response.ok || !result.success) {
        throw new Error(result.message || 'Não foi possível carregar preferência pt-BR.');
      }
      ptbrAtivo = Boolean(result.ptbr_ativo);
      containerNovoCardPtBr.classList.toggle('hidden', !ptbrAtivo);
      containerEditarCardPtBr.classList.toggle('hidden', !ptbrAtivo);
      textoCardPtBr.classList.toggle('hidden', !ptbrAtivo);
      textoNovoCardPtBr.required = ptbrAtivo;
      textoEditarCardPtBr.required = ptbrAtivo;
    }

    function resetCurrentAudioPlayer() {
      if (!audioCardAtual) {
        setAudioPlaybackUiState(false);
        return;
      }
      audioCardAtual.pause();
      audioCardAtual.currentTime = 0;
      audioCardAtual.removeAttribute('src');
      audioCardAtual.load();
      audioCardAtual = null;
      setAudioPlaybackUiState(false);
      setAudioLoopUiState(false);
    }

    function updateAudioButtonsState() {
      const hasCard = Number.isInteger(idCardAtual) && idCardAtual > 0;
      const podeGerarAudioEnGb = hasCard && !cardAtualEhPtBrPrimario;
      btnGerarAudioCardEnGb.disabled = !podeGerarAudioEnGb;
      btnGerarAudioCardEnGb.classList.toggle('opacity-50', !podeGerarAudioEnGb);
      btnGerarAudioCardEnGb.classList.toggle('cursor-not-allowed', !podeGerarAudioEnGb);
      btnEditarCard.disabled = !hasCard;
      btnReproduzirAudioCardEnGb.disabled = !podeGerarAudioEnGb;
      btnRepetirAudioCardEnGb.disabled = !podeGerarAudioEnGb;
    }

    function atualizarSwitchRespostaPtBrPrimarioUi() {
      switchRespostaPtBrPrimario.setAttribute('aria-checked', respostaPtBrPrimario ? 'true' : 'false');
      switchRespostaPtBrPrimario.classList.toggle('bg-fuchsia-700/70', respostaPtBrPrimario);
      switchRespostaPtBrPrimario.classList.toggle('border-fuchsia-400/70', respostaPtBrPrimario);
      switchRespostaPtBrPrimario.classList.toggle('bg-slate-800', !respostaPtBrPrimario);
      switchRespostaPtBrPrimario.classList.toggle('border-slate-600', !respostaPtBrPrimario);
      switchRespostaPtBrPrimarioKnob.style.transform = respostaPtBrPrimario ? 'translateX(1.6rem)' : 'translateX(0)';
      btnTraduzirRespostaPar.disabled = respostaPtBrPrimario;
      textoRespostaParEnGb.placeholder = respostaPtBrPrimario
        ? 'Digite o texto em português (pt-BR)...'
        : 'Digite o texto em inglês (en-GB)...';
    }

    function renderTextoCard(card = null) {
      if (!card) {
        textoCard.textContent = 'Card sem texto.';
        textoCardPtBr.textContent = '';
        tituloExpansions.textContent = '--';
        return;
      }

      const normalizarTextoCard = (valor) => {
        const texto = typeof valor === 'string' ? valor : '';
        const textoNormalizado = texto.trim();
        return textoNormalizado.toLowerCase() === 'null' ? '' : textoNormalizado;
      };
      const textoEnGb = normalizarTextoCard(card.texto_engb);
      const textoPtBr = normalizarTextoCard(card.texto_ptbr);
      const textoLegado = normalizarTextoCard(card.texto);
      const textoPrincipal = textoEnGb || textoPtBr || textoLegado;
      cardAtualEhPtBrPrimario = textoEnGb === '' && (textoPtBr !== '' || textoLegado !== '');
      quantidadeRevisoesCardAtual = Number.parseInt(card.revisao_quantidade_max || '0', 10) || 0;
      textoCard.textContent = textoPrincipal || 'Card sem texto.';
      textoCard.classList.toggle('text-[#8A05BE]', cardAtualEhPtBrPrimario);
      textoCard.classList.toggle('text-white', !cardAtualEhPtBrPrimario);
      textoCardPtBr.textContent = ptbrAtivo && !cardAtualEhPtBrPrimario && textoPtBr ? textoPtBr : '';
      textoCard.classList.toggle('mt-0', !textoCardPtBr.textContent);
      textoCard.classList.toggle('mt-2', Boolean(textoCardPtBr.textContent));
      tituloExpansions.textContent = String(card.expansions ?? '--');
      updateAudioButtonsState();
    }

    function showFeedback(message) {
      feedbackCriarPares.textContent = message;
      feedbackCriarPares.classList.remove('hidden');
      feedbackCriarPares.classList.remove('border-emerald-500/40', 'bg-emerald-500/10', 'text-emerald-200');
      feedbackCriarPares.classList.add('border-rose-500/40', 'bg-rose-500/10', 'text-rose-200');
    }

    function incrementarContadorCardsCriados() {
      contadorCardsCriados = contadorCardsCriados >= 15 ? 0 : contadorCardsCriados + 1;
      contadorCriacaoCards.textContent = String(contadorCardsCriados);
    }

    function hideFeedback() {
      feedbackCriarPares.classList.add('hidden');
    }

    function openModalNovoCard() {
      modalNovoCard.classList.remove('hidden');
      modalNovoCard.classList.add('flex');
      textoNovoCardEnGb.focus();
    }

    function closeModalNovoCard() {
      modalNovoCard.classList.add('hidden');
      modalNovoCard.classList.remove('flex');
      formNovoCard.reset();
    }

    function openModalEditarCard() {
      if (!Number.isInteger(idCardAtual) || idCardAtual <= 0) {
        showFeedback('Nenhum card ativo para editar.');
        return;
      }

      textoEditarCardEnGb.value = (textoCard.textContent || '').trim();
      textoEditarCardPtBr.value = (textoCardPtBr.textContent || '').trim();
      modalEditarCard.classList.remove('hidden');
      modalEditarCard.classList.add('flex');
      textoEditarCardEnGb.focus();
    }

    function closeModalEditarCard() {
      modalEditarCard.classList.add('hidden');
      modalEditarCard.classList.remove('flex');
      formEditarCard.reset();
    }

    btnVoltar.addEventListener('click', () => {
      const nextParams = new URLSearchParams(window.location.search);
      nextParams.set('view', 'biblioteca');
      nextParams.delete('id_pai');
      nextParams.delete('id_diretorio');
      nextParams.delete('tipo_diretorio');
      const newUrl = `${window.location.pathname}?${nextParams.toString()}`;
      window.history.pushState({}, '', newUrl);
      window.dispatchEvent(new PopStateEvent('popstate'));
    }, { signal });

    btnNovoCard.addEventListener('click', openModalNovoCard, { signal });
    btnEditarCard.addEventListener('click', openModalEditarCard, { signal });
    btnFecharModalNovoCard.addEventListener('click', closeModalNovoCard, { signal });
    btnFecharModalEditarCard.addEventListener('click', closeModalEditarCard, { signal });
    btnCancelarNovoCard.addEventListener('click', closeModalNovoCard, { signal });
    btnCancelarEditarCard.addEventListener('click', closeModalEditarCard, { signal });

    modalNovoCard.addEventListener('click', (event) => {
      if (event.target === modalNovoCard) {
        closeModalNovoCard();
      }
    }, { signal });

    modalEditarCard.addEventListener('click', (event) => {
      if (event.target === modalEditarCard) {
        closeModalEditarCard();
      }
    }, { signal });

    formNovoCard.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (Number.isNaN(idDiretorio) || idDiretorio <= 0) {
        showFeedback('ID do diretório inválido.');
        return;
      }

      const textoEnGb = textoNovoCardEnGb.value.trim();
      const textoPtBr = textoNovoCardPtBr.value.trim();

      if (!textoEnGb || (ptbrAtivo && !textoPtBr)) {
        showFeedback('Preencha o texto en-GB e, com pt-BR ativo, também o texto pt-BR.');
        return;
      }

      btnSalvarNovoCard.disabled = true;
      btnSalvarNovoCard.textContent = 'Salvando...';

      try {
        const response = await fetch('api/pares.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            action: 'criar_card',
            id_diretorio: idDiretorio,
            texto_engb: textoEnGb,
            texto_ptbr: ptbrAtivo ? textoPtBr : '',
          }),
        });
        const result = await response.json();

        if (response.status === 401) {
          window.location.href = 'index.html?view=login';
          return;
        }

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Não foi possível criar o card.');
        }

        hideFeedback();
        closeModalNovoCard();
        renderTextoCard(result.card);
        idCardAtual = Number.parseInt(result.card.id, 10);
        quantidadeRevisoesCardAtual = 0;
        incrementarContadorCardsCriados();
        limparCacheAudioCard();
        resetCurrentAudioPlayer();
        updateAudioButtonsState();
        if (!cardAtualEhPtBrPrimario) {
          await tentarAutoPlayCardAtual();
        }
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao criar card.');
      } finally {
        btnSalvarNovoCard.disabled = false;
        btnSalvarNovoCard.textContent = 'Salvar';
      }
    }, { signal });

    formEditarCard.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (!Number.isInteger(idCardAtual) || idCardAtual <= 0) {
        showFeedback('Nenhum card ativo para editar.');
        return;
      }

      const textoEnGb = textoEditarCardEnGb.value.trim();
      const textoPtBr = textoEditarCardPtBr.value.trim();

      if (!textoEnGb || (ptbrAtivo && !textoPtBr)) {
        showFeedback('Preencha o texto en-GB e, com pt-BR ativo, também o texto pt-BR.');
        return;
      }

      btnSalvarEditarCard.disabled = true;
      btnSalvarEditarCard.textContent = 'Salvando...';

      try {
        const response = await fetch('api/pares.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            action: 'editar_card',
            id_card: idCardAtual,
            texto_engb: textoEnGb,
            texto_ptbr: ptbrAtivo ? textoPtBr : '',
          }),
        });
        const result = await response.json();

        if (response.status === 401) {
          window.location.href = 'index.html?view=login';
          return;
        }

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Não foi possível editar o card.');
        }

        hideFeedback();
        closeModalEditarCard();
        renderTextoCard(result.card);
        limparCacheAudioCard();
        resetCurrentAudioPlayer();
        updateAudioButtonsState();
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao editar card.');
      } finally {
        btnSalvarEditarCard.disabled = false;
        btnSalvarEditarCard.textContent = 'Salvar';
      }
    }, { signal });

    btnTraduzirNovoCard.addEventListener('click', async () => {
      const texto = textoNovoCardEnGb.value.trim();
      if (!texto) {
        showFeedback('Digite no campo en-GB (em português) para traduzir para en-GB.');
        return;
      }

      btnTraduzirNovoCard.disabled = true;
      btnTraduzirNovoCard.textContent = 'Traduzindo...';

      try {
        const response = await fetch('api/pares.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            action: 'traduzir_texto_para_engb',
            texto,
          }),
        });

        const result = await response.json();

        if (response.status === 401) {
          window.location.href = 'index.html?view=login';
          return;
        }

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Não foi possível traduzir o texto.');
        }

        textoNovoCardEnGb.value = result.texto_traduzido || texto;
        hideFeedback();
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao traduzir texto.');
      } finally {
        btnTraduzirNovoCard.disabled = false;
        btnTraduzirNovoCard.textContent = 'Traduzir para en-GB';
      }
    }, { signal });

    function resizeTextarea(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = `${Math.min(textarea.scrollHeight, 192)}px`;
    }

    textoRespostaParEnGb.addEventListener('input', () => resizeTextarea(textoRespostaParEnGb), { signal });
    resizeTextarea(textoRespostaParEnGb);

    switchRespostaPtBrPrimario.addEventListener('click', () => {
      respostaPtBrPrimario = !respostaPtBrPrimario;
      atualizarSwitchRespostaPtBrPrimarioUi();
    }, { signal });

    btnTraduzirRespostaPar.addEventListener('click', async () => {
      const texto = textoRespostaParEnGb.value.trim();
      if (!texto) {
        showFeedback('Digite no campo en-GB (em português) para traduzir para en-GB.');
        return;
      }

      btnTraduzirRespostaPar.disabled = true;
      btnTraduzirRespostaPar.textContent = 'Traduzindo...';

      try {
        const response = await fetch('api/pares.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            action: 'traduzir_texto_para_engb',
            texto,
          }),
        });

        const result = await response.json();

        if (response.status === 401) {
          window.location.href = 'index.html?view=login';
          return;
        }

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Não foi possível traduzir o texto do formulário.');
        }

        textoRespostaParEnGb.value = result.texto_traduzido || texto;
        resizeTextarea(textoRespostaParEnGb);
        hideFeedback();
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao traduzir texto do formulário.');
      } finally {
        btnTraduzirRespostaPar.disabled = false;
        btnTraduzirRespostaPar.textContent = 'Traduzir para en-GB';
      }
    }, { signal });

    formRespostaPar.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (Number.isNaN(idDiretorio) || idDiretorio <= 0) {
        showFeedback('ID do diretório inválido.');
        return;
      }

      if (!Number.isInteger(idCardAtual) || idCardAtual <= 0) {
        showFeedback('Nenhum card ativo disponível para criar um novo card relacionado.');
        return;
      }

      const textoDigitado = textoRespostaParEnGb.value.trim();
      if (!textoDigitado) {
        showFeedback('Preencha o texto para enviar.');
        return;
      }
      const textoPtBr = respostaPtBrPrimario ? textoDigitado : '';
      const textoEnGb = respostaPtBrPrimario ? '' : textoDigitado;

      btnEnviarRespostaPar.disabled = true;
      btnEnviarRespostaPar.textContent = 'Enviando...';

      try {
        const response = await fetch('api/pares.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            action: 'criar_card_relacionado',
            id_diretorio: idDiretorio,
            id_card_base: idCardAtual,
            modo_texto: respostaPtBrPrimario ? 'ptbr' : 'engb',
            texto_engb: textoEnGb,
            texto_ptbr: respostaPtBrPrimario ? textoPtBr : '',
          }),
        });
        const result = await response.json();

        if (response.status === 401) {
          window.location.href = 'index.html?view=login';
          return;
        }

        if (!response.ok || !result.success) {
          const detail = typeof result.detail === 'string' && result.detail.trim()
            ? ` Detalhe: ${result.detail.trim()}`
            : '';
          throw new Error(`${result.message || 'Não foi possível criar o card relacionado.'}${detail}`);
        }

        hideFeedback();
        textoRespostaParEnGb.value = '';
        resizeTextarea(textoRespostaParEnGb);
        const baseCardRemovido = Boolean(result.base_card?.removido);
        incrementarContadorCardsCriados();
        const mensagemRemocao = baseCardRemovido
          ? ' Card base removido automaticamente após atingir 20 expansões.'
          : '';
        showFeedback(`Card criado com sucesso! Card ${result.card.id} vinculado ao card base ${result.base_card.id}. Expansão atual: ${result.base_card.expansions}.${mensagemRemocao}`);
        await loadCardMaisAntigo();
        feedbackCriarPares.classList.remove('border-rose-500/40', 'bg-rose-500/10', 'text-rose-200');
        feedbackCriarPares.classList.add('border-emerald-500/40', 'bg-emerald-500/10', 'text-emerald-200');
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao criar card relacionado.');
      } finally {
        btnEnviarRespostaPar.disabled = false;
        btnEnviarRespostaPar.textContent = 'Enviar';
      }
    }, { signal });

    async function loadCardMaisAntigo(idCardExcluir = null) {
      if (Number.isNaN(idDiretorio) || idDiretorio <= 0) {
        showFeedback('ID do diretório inválido.');
        textoCard.textContent = 'Não foi possível carregar o card.';
        tituloExpansions.textContent = '--';
        return;
      }

      hideFeedback();

      try {
        const queryParams = new URLSearchParams({
          action: 'card_criacao',
          id_diretorio: String(idDiretorio),
        });
        if (Number.isInteger(idCardExcluir) && idCardExcluir > 0) {
          queryParams.set('id_card_excluir', String(idCardExcluir));
        }
        const endpoint = `api/pares.php?${queryParams.toString()}`;
        const response = await fetch(endpoint, { cache: 'no-store' });
        const result = await response.json();

        if (response.status === 401) {
          window.location.href = 'index.html?view=login';
          return;
        }

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Não foi possível carregar o card.');
        }

        if (typeof result.ptbr_ativo === 'boolean') {
          ptbrAtivo = result.ptbr_ativo;
          containerNovoCardPtBr.classList.toggle('hidden', !ptbrAtivo);
          textoCardPtBr.classList.toggle('hidden', !ptbrAtivo);
          textoNovoCardPtBr.required = ptbrAtivo;
        }

        if (!result.card) {
          idCardAtual = null;
          quantidadeRevisoesCardAtual = 0;
          limparCacheAudioCard();
          resetCurrentAudioPlayer();
          textoCard.textContent = 'Nenhum card disponível para expansão foi encontrado.';
          tituloExpansions.textContent = '--';
          updateAudioButtonsState();
          return;
        }

        idCardAtual = Number.parseInt(result.card.id, 10);
        quantidadeRevisoesCardAtual = Number.parseInt(result.card.revisao_quantidade_max || '0', 10) || 0;
        limparCacheAudioCard();
        resetCurrentAudioPlayer();
        renderTextoCard(result.card);
        updateAudioButtonsState();
        if (!cardAtualEhPtBrPrimario) {
          await tentarAutoPlayCardAtual();
        }
      } catch (error) {
        idCardAtual = null;
        quantidadeRevisoesCardAtual = 0;
        limparCacheAudioCard();
        resetCurrentAudioPlayer();
        showFeedback(error.message || 'Erro inesperado ao carregar card.');
        textoCard.textContent = 'Erro ao carregar o card.';
        tituloExpansions.textContent = '--';
        updateAudioButtonsState();
      }
    }

    async function ensureCardAudiosBase64() {
      const textoAtual = (textoCard.textContent || '').trim();
      if (!textoAtual) {
        throw new Error('Card sem texto disponível para gerar áudio.');
      }
      if (textoAtual.length > AUDIO_CARD_MAX_CHARS) {
        throw new Error(`Texto muito longo para áudio (${textoAtual.length} caracteres). Limite: ${AUDIO_CARD_MAX_CHARS}.`);
      }
      if (cacheAudioCardId === idCardAtual && (cacheAudioCardEnGbBase64 || cacheAudioCardPtBrBase64)) {
        return {
          audioEnGb: cacheAudioCardEnGbBase64,
          audioPtBr: cacheAudioCardPtBrBase64,
        };
      }

      const response = await fetch('api/pares.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          action: 'gerar_audio_card',
          id_card: idCardAtual,
        }),
      });
      const result = await response.json();

      if (response.status === 401) {
        window.location.href = 'index.html?view=login';
        return;
      }

      if (!response.ok || !result.success) {
        throw new Error(result.message || 'Não foi possível gerar áudio para o card.');
      }

      const audioEnGb = (result.card?.audio_engb || result.card?.audio || '').trim();
      const audioPtBr = (result.card?.audio_ptbr || '').trim();
      cacheAudioCardId = idCardAtual;
      cacheAudioCardEnGbBase64 = audioEnGb;
      cacheAudioCardPtBrBase64 = audioPtBr;
      return { audioEnGb, audioPtBr };
    }

    async function playAudioBase64(audioBase64, { loop = false } = {}) {
      if (!audioBase64) {
        throw new Error('Áudio indisponível para reprodução.');
      }

      resetCurrentAudioPlayer();

      const audioDataUrl = `data:audio/mpeg;base64,${audioBase64}`;
      audioCardAtual = new Audio();
      audioCardAtual.preload = 'metadata';
      audioCardAtual.src = audioDataUrl;
      audioCardAtual.loop = loop;
      audioCardAtual.onended = () => setAudioPlaybackUiState(false);
      audioCardAtual.onpause = () => {
        if (audioCardAtual && audioCardAtual.currentTime < audioCardAtual.duration) {
          setAudioPlaybackUiState(false);
        }
      };
      audioCardAtual.onerror = () => setAudioPlaybackUiState(false);
      setAudioPlaybackUiState(true);
      setAudioLoopUiState(loop);
      try {
        await audioCardAtual.play();
        if (!loop) {
          await new Promise((resolve) => {
            audioCardAtual.onended = () => {
              setAudioPlaybackUiState(false);
              resolve();
            };
          });
        }
      } catch (error) {
        setAudioPlaybackUiState(false);
        setAudioLoopUiState(false);
        throw new Error('Não foi possível iniciar a reprodução de áudio.');
      }
    }

    async function playCurrentCardAudio({ loop = false } = {}) {
      if (!Number.isInteger(idCardAtual) || idCardAtual <= 0) {
        throw new Error('Nenhum card ativo disponível para reproduzir áudio.');
      }
      const { audioEnGb, audioPtBr } = await ensureCardAudiosBase64();
      const audios = [];
      if (audioPtBr) {
        audios.push(audioPtBr);
      }
      if (audioEnGb) {
        audios.push(audioEnGb);
      }
      if (audios.length === 0) {
        throw new Error('Áudio indisponível para reprodução.');
      }
      for (let i = 0; i < audios.length; i += 1) {
        const isLast = i === audios.length - 1;
        await playAudioBase64(audios[i], { loop: loop && isLast });
      }
    }

    function pauseCurrentCardAudio({ disableLoop = true } = {}) {
      if (!audioCardAtual) {
        if (disableLoop) {
          setAudioLoopUiState(false);
        }
        return;
      }
      audioCardAtual.pause();
      audioCardAtual.currentTime = 0;
      setAudioPlaybackUiState(false);
      if (disableLoop) {
        setAudioLoopUiState(false);
      }
    }

    async function tentarAutoPlayCardAtual() {
      try {
        await playCurrentCardAudio();
      } catch (_error) {}
    }

    btnGerarAudioCardEnGb.addEventListener('click', async () => {
      if (!Number.isInteger(idCardAtual) || idCardAtual <= 0) {
        showFeedback('Nenhum card ativo disponível para gerar áudio.');
        return;
      }

      hideFeedback();
      btnGerarAudioCardEnGb.disabled = true;
      btnGerarAudioCardEnGb.classList.add('opacity-50', 'cursor-not-allowed');

      try {
        await playCurrentCardAudio();
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao gerar/reproduzir áudio en-GB.');
      } finally {
        btnGerarAudioCardEnGb.disabled = false;
        btnGerarAudioCardEnGb.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    }, { signal });

    btnReproduzirAudioCardEnGb.addEventListener('click', async () => {
      if (audioCardEmReproducao) {
        pauseCurrentCardAudio();
        return;
      }

      hideFeedback();
      try {
        await playCurrentCardAudio();
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao reproduzir áudio do card.');
      }
    }, { signal });

    btnRepetirAudioCardEnGb.addEventListener('click', async () => {
      if (audioCardRepeticaoAtiva) {
        pauseCurrentCardAudio();
        return;
      }

      hideFeedback();
      try {
        await playCurrentCardAudio({ loop: true });
      } catch (error) {
        showFeedback(error.message || 'Erro inesperado ao repetir áudio do card.');
      }
    }, { signal });

    document.addEventListener('view:before-unload', () => {
      resetCurrentAudioPlayer();
      viewLifecycleController.abort();
    }, { once: true, signal });

    btnTraduzirNovoCard.textContent = 'Traduzir para en-GB';
    btnTraduzirRespostaPar.textContent = 'Traduzir para en-GB';
    updateAudioButtonsState();
    carregarPreferenciaPtBr()
      .then(() => {
        loadCardMaisAntigo();
      })
      .catch((error) => {
        showFeedback(error.message || 'Erro ao carregar preferência pt-BR.');
        loadCardMaisAntigo();
      });
  })();
</script>
