<section class="w-full max-w-md rounded-2xl border border-slate-800 bg-slate-900/70 p-6 shadow-2xl backdrop-blur">
  <header class="mb-6 text-center">
    <h1 class="text-2xl font-bold text-white">Acesso ao Sistema</h1>
    <p class="mt-1 text-sm text-slate-400">Faça login ou crie sua conta</p>
  </header>

  <div class="mb-5 flex items-center justify-between rounded-lg bg-slate-800 p-1 text-xs text-slate-300">
    <span class="px-3 py-1" id="loginLabel">Login</span>
    <button id="modeSwitch" type="button" class="rounded-md bg-brand-600 px-3 py-1 font-semibold text-white transition hover:bg-brand-500">
      Trocar para criar conta
    </button>
  </div>

  <form id="authForm" class="space-y-4" autocomplete="off">
    <div>
      <label for="username" class="mb-1 block text-sm font-medium text-slate-200">Nome de usuário</label>
      <input
        id="username"
        name="nome_de_usuario"
        required
        minlength="3"
        maxlength="50"
        class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none ring-brand-500 transition focus:ring"
        placeholder="Digite seu nome de usuário"
      />
    </div>

    <div>
      <label for="password" class="mb-1 block text-sm font-medium text-slate-200">Senha</label>
      <input
        id="password"
        name="senha"
        type="password"
        required
        minlength="8"
        maxlength="200"
        class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none ring-brand-500 transition focus:ring"
        placeholder="Digite sua senha"
      />
    </div>

    <button id="submitBtn" type="submit" class="w-full rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-brand-500">
      Entrar
    </button>

    <p id="feedback" class="hidden rounded-lg border p-2 text-sm"></p>
  </form>
</section>

<script>
  (function initAuthView() {
    const form = document.getElementById('authForm');
    const switchButton = document.getElementById('modeSwitch');
    const submitButton = document.getElementById('submitBtn');
    const feedback = document.getElementById('feedback');
    const loginLabel = document.getElementById('loginLabel');

    let mode = 'login';

    function showMessage(message, type = 'error') {
      feedback.textContent = message;
      feedback.classList.remove('hidden', 'border-rose-500/40', 'bg-rose-500/10', 'text-rose-200', 'border-emerald-500/40', 'bg-emerald-500/10', 'text-emerald-200');
      if (type === 'success') {
        feedback.classList.add('border-emerald-500/40', 'bg-emerald-500/10', 'text-emerald-200');
      } else {
        feedback.classList.add('border-rose-500/40', 'bg-rose-500/10', 'text-rose-200');
      }
    }

    function setMode(newMode) {
      mode = newMode;
      const isLogin = mode === 'login';

      submitButton.textContent = isLogin ? 'Entrar' : 'Criar conta';
      switchButton.textContent = isLogin ? 'Trocar para criar conta' : 'Trocar para login';
      loginLabel.textContent = isLogin ? 'Login' : 'Criar conta';
      feedback.classList.add('hidden');
    }

    switchButton.addEventListener('click', () => {
      setMode(mode === 'login' ? 'register' : 'login');
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      feedback.classList.add('hidden');

      const formData = {
        nome_de_usuario: form.nome_de_usuario.value.trim(),
        senha: form.senha.value
      };

      try {
        const response = await fetch(`api/auth.php?action=${mode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Não foi possível concluir a operação.');
        }

        if (mode === 'register') {
          showMessage('Conta criada com sucesso. Agora faça login.', 'success');
          setMode('login');
          return;
        }

        showMessage('Login realizado com sucesso. Redirecionando...', 'success');
        setTimeout(() => {
          window.location.href = 'index.html?view=biblioteca';
        }, 500);
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });

    setMode('login');
  })();
</script>
