<section
  id="authCard"
  class="w-full max-w-md rounded-2xl border border-brand-500/40 bg-brand-500/10 p-6 shadow-2xl backdrop-blur transition-all duration-300"
>
  <header class="mb-6 text-center">
    <h1 id="authTitle" class="text-2xl font-bold text-white">Entrar na sua conta</h1>
    <p id="authSubtitle" class="mt-1 text-sm text-slate-300">Use seu usuário e senha para continuar</p>
  </header>

  <div class="mb-5 rounded-xl border border-slate-700/80 bg-slate-900/80 p-1.5 text-sm shadow-inner">
    <div class="grid grid-cols-2 gap-1.5">
      <button
        id="tabLogin"
        type="button"
        class="rounded-lg px-3 py-2 font-semibold transition-all duration-200"
      >
        Login
      </button>
      <button
        id="tabRegister"
        type="button"
        class="rounded-lg px-3 py-2 font-semibold transition-all duration-200"
      >
        Criar conta
      </button>
    </div>
  </div>

  <form id="authForm" class="space-y-4" autocomplete="off">
    <div>
      <label for="username" class="mb-1 block text-sm font-medium text-slate-200">Nome de usuário</label>
      <input
        id="username"
        name="nome_de_usuario"
        required
        minlength="3"
        maxlength="50"
        class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none ring-brand-500 transition focus:ring"
        placeholder="Digite seu nome de usuário"
      />
    </div>

    <div>
      <label for="password" class="mb-1 block text-sm font-medium text-slate-200">Senha</label>
      <input
        id="password"
        name="senha"
        type="password"
        required
        minlength="8"
        maxlength="200"
        class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none ring-brand-500 transition focus:ring"
        placeholder="Digite sua senha"
      />
    </div>

    <button id="submitBtn" type="submit" class="w-full rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-brand-500">
      Entrar
    </button>

    <p id="feedback" class="hidden rounded-lg border p-2 text-sm"></p>
  </form>
</section>

<script>
  (function initAuthView() {
    const form = document.getElementById('authForm');
    const authCard = document.getElementById('authCard');
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const title = document.getElementById('authTitle');
    const subtitle = document.getElementById('authSubtitle');
    const submitButton = document.getElementById('submitBtn');
    const feedback = document.getElementById('feedback');

    let mode = 'login';

    function showMessage(message, type = 'error') {
      feedback.textContent = message;
      feedback.classList.remove('hidden', 'border-rose-500/40', 'bg-rose-500/10', 'text-rose-200', 'border-emerald-500/40', 'bg-emerald-500/10', 'text-emerald-200');
      if (type === 'success') {
        feedback.classList.add('border-emerald-500/40', 'bg-emerald-500/10', 'text-emerald-200');
      } else {
        feedback.classList.add('border-rose-500/40', 'bg-rose-500/10', 'text-rose-200');
      }
    }

    function setMode(newMode) {
      mode = newMode;
      const isLogin = mode === 'login';

      title.textContent = isLogin ? 'Entrar na sua conta' : 'Criar uma nova conta';
      subtitle.textContent = isLogin
        ? 'Use seu usuário e senha para continuar'
        : 'Preencha os dados para começar a usar o sistema';

      submitButton.textContent = isLogin ? 'Entrar' : 'Criar conta';
      authCard.classList.toggle('border-brand-500/40', isLogin);
      authCard.classList.toggle('bg-brand-500/10', isLogin);
      authCard.classList.toggle('border-emerald-500/40', !isLogin);
      authCard.classList.toggle('bg-emerald-500/10', !isLogin);

      submitButton.classList.toggle('bg-brand-600', isLogin);
      submitButton.classList.toggle('hover:bg-brand-500', isLogin);
      submitButton.classList.toggle('bg-emerald-600', !isLogin);
      submitButton.classList.toggle('hover:bg-emerald-500', !isLogin);

      tabLogin.classList.toggle('bg-brand-600', isLogin);
      tabLogin.classList.toggle('text-white', isLogin);
      tabLogin.classList.toggle('shadow-lg', isLogin);
      tabLogin.classList.toggle('shadow-brand-900/30', isLogin);
      tabLogin.classList.toggle('ring-1', isLogin);
      tabLogin.classList.toggle('ring-brand-300/40', isLogin);
      tabLogin.classList.toggle('text-slate-300', !isLogin);
      tabLogin.classList.toggle('bg-slate-900/30', !isLogin);
      tabLogin.classList.toggle('hover:bg-slate-800', !isLogin);

      tabRegister.classList.toggle('bg-emerald-600', !isLogin);
      tabRegister.classList.toggle('text-white', !isLogin);
      tabRegister.classList.toggle('shadow-lg', !isLogin);
      tabRegister.classList.toggle('shadow-emerald-900/30', !isLogin);
      tabRegister.classList.toggle('ring-1', !isLogin);
      tabRegister.classList.toggle('ring-emerald-300/40', !isLogin);
      tabRegister.classList.toggle('text-slate-300', isLogin);
      tabRegister.classList.toggle('bg-slate-900/30', isLogin);
      tabRegister.classList.toggle('hover:bg-slate-800', isLogin);

      feedback.classList.add('hidden');
    }

    tabLogin.addEventListener('click', () => setMode('login'));
    tabRegister.addEventListener('click', () => setMode('register'));

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      feedback.classList.add('hidden');

      const formData = {
        nome_de_usuario: form.nome_de_usuario.value.trim(),
        senha: form.senha.value
      };

      try {
        const response = await fetch(`api/auth.php?action=${mode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
          throw new Error(result.message || 'Não foi possível concluir a operação.');
        }

        if (mode === 'register') {
          showMessage('Conta criada com sucesso. Agora faça login.', 'success');
          setMode('login');
          return;
        }

        showMessage('Login realizado com sucesso. Redirecionando...', 'success');
        setTimeout(() => {
          window.location.href = 'index.html?view=biblioteca';
        }, 500);
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });

    setMode('login');
  })();
</script>
